<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Telegram Earning App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Telegram WebApp Script -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>💸 Earn Money</h2>
    <p>Click the button & watch ad for 15 seconds</p>

    <button onclick="showAd()">Watch Ad</button>

    <p id="8698208586"></p>
  </div>

  <script>
    const tg = window.megaprofitsbot;
    tg.expand();

    function showAd() {
      document.getElementById("status").innerText = "⏳ Ad is loading...";

      // 🔴 এখানে আপনার Adsterra Smart Link বসাতে হবে
      let adLink = "https://ln.run/7sLd8";

      window.open(adLink, "_blank");

      // 15 sec timer
      setTimeout(() => {
        document.getElementById("status").innerText = "✅ You earned 0.01$";
        
        // 🔴 এখানে backend API call করতে হবে (optional)
        // fetch("https://your-server.com/earn", {method: "POST"});

      }, 15000);
    }
  </script>

</body>
</html>
