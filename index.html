 <!DOCTYPE html>
<html lang="en">
<head>
 <script src='//libtl.com/sdk.js' data-zone='10853025' data-sdk='show_10853025'></script>
 <meta charset="UTF-8">
  <title>Telegram Earning App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

  <h2>💰 Earn Money Bot</h2>

  <div class="card">
    <p>👤 User: <span id="username">Loading...</span></p>
    <p>💵 Balance: <span id="balance">0</span> ৳</p>
  </div>

  <div class="card">
    <h3>🎯 Watch Ads</h3>
    <button onclick="watchAd()">Watch Ad (15s)</button>
  </div>

  <div class="card">
    <h3>👥 Referral</h3>
    <p>Your Link:</p>
    <input type="text" id="refLink" readonly style="width:90%;padding:8px;">
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let user = tg.initDataUnsafe.user;

    document.getElementById("username").innerText =
      user?.first_name || "Guest";

    let balance = 0;

    function watchAd() {
      // 👉 Adsterra Smart Link
      window.open("https://omg10.com/4/10853000", "_blank");

      setTimeout(() => {
        balance += 5;
        document.getElementById("balance").innerText = balance;

        alert("✅ Ad watched! +5৳ added");
      }, 15000);
    }

    // 👉 Referral Link
    document.getElementById("refLink").value =
      "https://t.me/megaprofitsbot?start=8012101922"

  </script>

</body>
</html>
